name: Agent Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  agent-check:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: oven-sh/setup-bun@v2

      - run: sh scripts/agent-check
